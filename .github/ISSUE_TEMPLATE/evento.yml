name: "📅 Sugerir un Evento"
description: Proponer un evento para el directorio de PlazaP2P (meetup, taller, conferencia, etc.)
title: "[EVENTO] "
labels: ["evento", "pendiente-revision"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por contribuir al directorio de eventos de PlazaP2P.
        El mantenedor revisará tu propuesta y si es apropiada la añadirá al directorio.
        **PlazaP2P no verifica ni avala los eventos listados.** Cada persona es responsable de verificar la información antes de asistir.

  - type: input
    id: nombre
    attributes:
      label: Nombre del evento
      placeholder: "Bitcoin P2P Meetup Madrid"
    validations:
      required: true

  - type: dropdown
    id: tipo
    attributes:
      label: Tipo de evento
      options:
        - Meetup
        - Taller
        - Conferencia
        - Hackathon
        - Online
        - Otro
    validations:
      required: true

  - type: input
    id: fecha
    attributes:
      label: Fecha (YYYY-MM-DD)
      placeholder: "2026-07-15"
    validations:
      required: true

  - type: input
    id: hora
    attributes:
      label: Hora (HH:MM, zona horaria local)
      placeholder: "19:00 CET"

  - type: input
    id: lugar
    attributes:
      label: Lugar (dirección o nombre del espacio)
      placeholder: "Espacio Bitcoin, C/ Gran Vía 1, Madrid"

  - type: input
    id: ciudad
    attributes:
      label: Ciudad
      placeholder: "Madrid"
    validations:
      required: true

  - type: input
    id: pais
    attributes:
      label: País
      placeholder: "España"
    validations:
      required: true

  - type: textarea
    id: descripcion
    attributes:
      label: Descripción del evento
      placeholder: "Breve descripción de qué se va a hacer, para quién es, qué aprenderán los asistentes..."
      render: markdown
    validations:
      required: true

  - type: input
    id: link
    attributes:
      label: Link del evento (Meetup, Eventbrite, Nostr, etc.)
      placeholder: "https://..."

  - type: input
    id: organizador
    attributes:
      label: Nombre del organizador o grupo
      placeholder: "Bitcoin Madrid"

  - type: input
    id: nostr_organizador
    attributes:
      label: Nostr del organizador (npub, opcional)
      placeholder: "npub1..."

  - type: dropdown
    id: gratuito
    attributes:
      label: ¿Es gratuito?
      options:
        - "Sí"
        - "No"
        - "Parte gratuito, parte de pago"
    validations:
      required: true

  - type: checkboxes
    id: confirmacion
    attributes:
      label: Confirmación
      options:
        - label: Confirmo que la información es correcta a mi leal saber y entender
          required: true
        - label: Entiendo que PlazaP2P no verifica ni es responsable del evento
          required: true
