name: "🎙 Sugerir Perfil Multimedia"
description: Proponer un perfil de persona, asociación o proyecto con sus redes oficiales agrupadas
title: "[MULTIMEDIA] "
labels: ["multimedia", "pendiente-revision"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por proponer un perfil multimedia para PlazaP2P.
        La idea es agrupar en una sola ficha las redes oficiales de una misma persona, asociación o proyecto.
        **PlazaP2P no verifica ni avala los recursos listados.** Cada persona es responsable de evaluar el contenido.

  - type: input
    id: nombre
    attributes:
      label: Nombre del perfil
      placeholder: "Persona, asociación, podcast, canal o proyecto"
    validations:
      required: true

  - type: dropdown
    id: tipo
    attributes:
      label: Tipo principal
      options:
        - Perfil agrupado
        - Podcast
        - Canal YouTube
        - Newsletter
        - Blog
        - Web
        - Livestream
        - Otro
    validations:
      required: true

  - type: textarea
    id: enlaces
    attributes:
      label: Enlaces oficiales
      description: Añade una URL por línea indicando la red o servicio.
      placeholder: |
        Web: https://...
        YouTube: https://www.youtube.com/@...
        X / Twitter: https://x.com/...
        Nostr: npub1...
        PDF: https://... o docs/archivo.pdf
        Podcast: https://...
    validations:
      required: true

  - type: input
    id: logo_url
    attributes:
      label: Logo o avatar
      description: Opcional. Pega una URL directa a una imagen oficial del logo/avatar, o indica que adjuntas el archivo en el issue.
      placeholder: "https://.../logo.png"
    validations:
      required: false

  - type: textarea
    id: descripcion
    attributes:
      label: Perfil breve
      placeholder: "¿Quién es o qué proyecto es? ¿Qué publica? ¿A quién ayuda? ¿Por qué merece estar agrupado aquí?"
    validations:
      required: true

  - type: dropdown
    id: idioma
    attributes:
      label: Idioma principal
      options:
        - Español
        - Inglés
        - Español/Inglés
        - Portugués
        - Bilingüe
        - Otro
    validations:
      required: true

  - type: checkboxes
    id: confirmacion
    attributes:
      label: Confirmación
      options:
        - label: Este recurso es legítimo y relevante para la comunidad Bitcoin/Nostr/P2P
          required: true
        - label: Entiendo que PlazaP2P no verifica ni es responsable del contenido listado
          required: true
