# Generado para PlazaP2P Bot — Fly.io
# Región 'mad' = Madrid (más cercana a España)
app            = 'plazap2p-bot'
primary_region = 'mad'

[build]

[http_service]
  internal_port        = 3000
  force_https          = true
  auto_stop_machines   = 'stop'
  auto_start_machines  = true
  min_machines_running = 0

[[vm]]
  size   = 'shared-cpu-1x'
  memory = '256mb'
